kind = "web"
previewPath = "/"
title = "Guilds Onchain Platform"
version = "1.0.0"
id = "artifacts/guilds-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18708
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/guilds-platform run dev"

[services.env]
PORT = "18708"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/guilds-platform", "run", "build"]
publicDir = "artifacts/guilds-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
